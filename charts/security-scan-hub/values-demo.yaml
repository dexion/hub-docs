## values-demo.yaml — overlay для публичного демо-стенда sshub.ru
##
## Применение:
##   helm upgrade hub charts/security-scan-hub -n hub -f charts/security-scan-hub/values-demo.yaml
##
## Приводит работающее демо (которое раньше патчилось ad-hoc через kubectl)
## обратно к воспроизводимому состоянию, управляемому чартом.
##
## СЕКРЕТЫ ЗДЕСЬ НЕ ЗАДАЮТСЯ. secrets.llmApiKey (ключ GLM) и secrets.dbPassword хранятся
## в Secret внутри кластера (<release>-secrets, helm.sh/resource-policy=keep — сохраняется
## между upgrade'ами). Ключ GLM НИКОГДА не должен попадать в git.

backend:
  backend:
    image:
      pullPolicy: Always        # демо работает на tag=latest; всегда тянуть свежий
    env:
      authMode: LOCAL
      frontendUrl: https://sshub.ru
      llmBaseUrl: https://api.z.ai/api/coding/paas/v4
      llmModel: glm-5.1
      llmDryRun: "false"
      sandboxType: ""
      storagePath: /app/storage/reports

worker:
  worker:
    image:
      pullPolicy: Always
    env:
      llmBaseUrl: https://api.z.ai/api/coding/paas/v4
      llmModel: glm-5.1
      llmDryRun: "false"
      sandboxType: ""                   # ОТКЛЮЧИТЬ sandbox — на демо нет реальных сетевых проб
      telegramNotificationWorkers: "1"  # НЕ 0 (River не принимает 0 воркеров для очереди)

frontend:
  frontend:
    image:
      pullPolicy: Always
    env:
      apiUrl: https://sshub.ru          # same-origin, чтобы работал local-login auth/config (иначе fallback на SSO)
      authMode: LOCAL

ingress:
  host: sshub.ru

demoReseed:
  enabled: true
  schedule: "0 */4 * * *"
  scale: small

## --- Сканеры, НЕ входящие в этот чарт ---
##
## openvas / owasp-zap / domainscope — это ОТДЕЛЬНЫЕ чарты/релизы. В демо-окружении
## они НЕ должны работать (никаких реальных сканов публичных целей). Не разворачивайте
## эти релизы здесь; если они уже установлены, масштабируйте их до 0 реплик.
## В этом overlay они намеренно отсутствуют.
