apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chart.fullname" . }}-backend-storage
  labels:
    app.kubernetes.io/component: backend
    {{- include "chart.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: {{ .Values.pvc.backendStorage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.pvc.backendStorage.size | quote }}
---
