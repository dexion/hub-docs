{{- if .Values.demoReseed.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-demo-seed
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: demo-reseed
    {{- include "chart.labels" . | nindent 4 }}
data:
  ## Bake every file in charts/security-scan-hub/seed/ (seed_demo.py, _seed_*.py,
  ## full-sarif.sarif) into ConfigMap keys, mounted at /seed in the CronJob.
{{ (.Files.Glob "seed/*").AsConfig | indent 2 }}
{{- end }}
