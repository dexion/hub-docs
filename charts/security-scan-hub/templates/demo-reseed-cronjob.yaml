{{- if .Values.demoReseed.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "chart.fullname" . }}-demo-reseed
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: demo-reseed
    {{- include "chart.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.demoReseed.schedule | default "0 */4 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1200
      template:
        metadata:
          labels:
            app.kubernetes.io/component: demo-reseed
            {{- include "chart.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "chart.fullname" . }}-demo-reseed
          restartPolicy: OnFailure
          containers:
          - name: seed
            image: python:3.12-slim
            env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "chart.secretsName" . }}
                  key: databaseUrl
            - name: BACKEND_URL
              value: {{ printf "http://%s-backend:8082" (include "chart.fullname" .) | quote }}
            command:
            - /bin/sh
            - -c
            - |
              set -e
              pip install --quiet --root-user-action=ignore psycopg2-binary faker bcrypt
              python /seed/seed_demo.py --db-url "$DB_URL" --clean --scale {{ .Values.demoReseed.scale | default "small" }}
              echo "reseed done; restarting backend to reload Casbin/state"
              python - <<'PY'
              import os,json,ssl,datetime,urllib.request
              tok=open('/var/run/secrets/kubernetes.io/serviceaccount/token').read()
              ca='/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
              h=os.environ['KUBERNETES_SERVICE_HOST']; p=os.environ['KUBERNETES_SERVICE_PORT']
              ts=datetime.datetime.utcnow().isoformat()+'Z'
              body=json.dumps({"spec":{"template":{"metadata":{"annotations":{"kubectl.kubernetes.io/restartedAt":ts}}}}}).encode()
              ctx=ssl.create_default_context(cafile=ca)
              dep="{{ include "chart.fullname" . }}-backend"
              req=urllib.request.Request("https://%s:%s/apis/apps/v1/namespaces/{{ .Release.Namespace }}/deployments/%s"%(h,p,dep),data=body,method='PATCH',headers={'Authorization':'Bearer '+tok,'Content-Type':'application/strategic-merge-patch+json'})
              print("restarted",dep,urllib.request.urlopen(req,context=ctx).status)
              PY
            volumeMounts:
            - name: seed
              mountPath: /seed
              readOnly: true
          volumes:
          - name: seed
            configMap:
              name: {{ include "chart.fullname" . }}-demo-seed
{{- end }}
