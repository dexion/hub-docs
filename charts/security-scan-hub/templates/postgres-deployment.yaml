apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
        env:
        - name: POSTGRES_DB
          value: {{ .Values.postgres.env.postgresDb | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.env.postgresUser | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "chart.secretsName" . }}
              key: dbPassword
        ## Свежие postgres:15 принимают подключения только с localhost (в
        ## дефолтном pg_hba.conf нет `host all all all`). Этот env при первом
        ## initdb добавляет правило для подовых IP.
        - name: POSTGRES_HOST_AUTH_METHOD
          value: scram-sha-256
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ .Values.kubernetesClusterDomain | quote }}
        ## initdb на пустом томе занимает 30-60 секунд; liveness без задержки
        ## убивал процесс посреди bootstrap, оставляя PGDATA с признаками
        ## инициализации, но без user-БД и нужных pg_hba правил.
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgres.env.postgresUser }}
          initialDelaySeconds: 60
          failureThreshold: 5
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgres.env.postgresUser }}
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      restartPolicy: Always
      serviceAccountName: {{ include "chart.serviceAccountName" . }}
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: {{ include "chart.fullname" . }}-postgres-data
