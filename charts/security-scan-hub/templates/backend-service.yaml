apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: backend
    {{- include "chart.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8082
    targetPort: 8082
    protocol: TCP
