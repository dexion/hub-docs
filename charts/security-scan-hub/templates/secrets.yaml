{{- if include "chart.shouldCreateSecret" . }}
{{- $dbPassword := include "chart.resolveSecret" (dict "ctx" . "key" "dbPassword" "length" 32) -}}
{{- $dbUser := .Values.postgres.env.postgresUser -}}
{{- $dbName := .Values.postgres.env.postgresDb -}}
{{- $dbHost := printf "%s-postgres" (include "chart.fullname" .) -}}
{{- $dbPort := "5432" -}}
{{- $dbUrl := printf "postgres://%s:%s@%s:%s/%s" $dbUser $dbPassword $dbHost $dbPort $dbName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.secretsName" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  dbPassword: {{ $dbPassword | quote }}
  databaseUrl: {{ $dbUrl | quote }}
  iacScannerDsn: {{ $dbUrl | quote }}
  jwtSecret: {{ include "chart.resolveSecret" (dict "ctx" . "key" "jwtSecret" "length" 64) | quote }}
  ## authClientSecret — внутренний oauth2/oidc client secret хаба. В env-переменной
  ## хаба прокидывается как KEYCLOAK_CLIENT_SECRET (имя сложилось исторически).
  authClientSecret: {{ include "chart.resolveSecret" (dict "ctx" . "key" "authClientSecret" "length" 32) | quote }}
  llmApiKey: {{ default "" ((.Values.secrets | default dict).llmApiKey) | quote }}
  iacScannerApiKey: {{ include "chart.resolveSecret" (dict "ctx" . "key" "iacScannerApiKey" "length" 32) | quote }}
  ## localAdminPassword — backend читает как LOCAL_ADMIN_PASSWORD и при первом
  ## старте создаёт юзера admin@hub.local с этим паролем (если в БД нет юзеров).
  ## Длина 32 alnum — статистически гарантирует upper+lower+digit (требование
  ## auth.ValidatePasswordStrength).
  localAdminPassword: {{ include "chart.resolveSecret" (dict "ctx" . "key" "localAdminPassword" "length" 32) | quote }}
{{- end }}
