{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chart.serviceAccountName" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Scanner pods do not call the Kubernetes API; bind no permissions and disable
# auto-mount of the SA token so a compromised pod cannot enumerate cluster state.
automountServiceAccountToken: false
{{- end }}
