{{- if include "chart.shouldCreateSecret" . }}
{{- $hub := include "chart.resolveToken" (dict "ctx" . "key" "hubToken") -}}
{{- $jira := include "chart.resolveToken" (dict "ctx" . "key" "jiraToken") -}}
{{- $conf := include "chart.resolveToken" (dict "ctx" . "key" "confluenceToken") -}}
{{/*
AVP placeholder guard. values-gitops.yaml ships strings like
"<path:kv/data/scans/prod#hubToken>". If the argocd-vault-plugin sidecar is
not wired up (operator did `helm install -f values-gitops.yaml` directly,
or AVP is misconfigured), those placeholders pass through unresolved and
would be written into Secret.stringData as plain literals — a non-functional
token AND a clear breadcrumb to the Vault path layout. Fail loudly instead.
*/}}
{{- range $name, $val := dict "hubToken" $hub "jiraToken" $jira "confluenceToken" $conf -}}
{{- if hasPrefix "<path:" $val -}}
{{- fail (printf "secrets.%s contains an unresolved AVP placeholder %q. Install argocd-vault-plugin or use values.yaml with literal tokens." $name $val) -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.secretsName" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  hubToken: {{ required "secrets.hubToken is required (Hub service-account API key)" $hub | quote }}
  jiraToken: {{ required "secrets.jiraToken is required (Jira PAT)" $jira | quote }}
  confluenceToken: {{ required "secrets.confluenceToken is required (Confluence PAT)" $conf | quote }}
{{- end }}
