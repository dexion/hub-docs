{{/*
Master secrets — one per subchart, with all keys each subchart's deployment
references via secretKeyRef. Cross-wired values (e.g. openvasAdminPassword used
by both openvas and domainscope) are written to BOTH places to keep subcharts
self-contained at deploy time.

All Secrets carry helm.sh/resource-policy=keep and use lookup() to preserve
generated values across upgrades.
*/}}

{{- $hubSecretName := printf "%s-hub-secrets" (include "hp.fullname" .) -}}
{{- $dsSecretName := printf "%s-domainscope-secrets" (include "hp.fullname" .) -}}
{{- $ovSecretName := printf "%s-openvas-secrets" (include "hp.fullname" .) -}}
{{- $zapSecretName := printf "%s-zap-secrets" (include "hp.fullname" .) -}}

{{/* --- Hub --- */}}
{{- $hubDb := include "hp.resolve" (dict "ctx" . "secretName" $hubSecretName "key" "hubDbPassword" "length" 32) -}}
{{- $hubFullname := include "hp.hubFullname" . -}}
{{- $hubDbHost := printf "%s-postgres" $hubFullname -}}
{{- $hubDbUrl := printf "postgres://securityhub:%s@%s:5432/securityhub" $hubDb $hubDbHost -}}

{{/* --- Default project + Service Account для domainscope/iac-scanner --- */}}
{{- $dp := default (dict) .Values.global.defaultProject -}}
{{- $defProjId := include "hp.resolveUuid" (dict "ctx" . "secretName" $hubSecretName "key" "defaultProjectId" "override" $dp.projectId) -}}
{{- $defProdId := include "hp.resolveUuid" (dict "ctx" . "secretName" $hubSecretName "key" "defaultProductId" "override" $dp.productId) -}}
{{- $defSAId   := include "hp.resolveUuid" (dict "ctx" . "secretName" $hubSecretName "key" "defaultSAId") -}}
{{/*
  SA-key формат хаба (см. backend/internal/auth/api_key.go):
    plain = "sa_<8-hex-prefix>_<base64-of-32-rand-bytes>"
  Backend хранит sha256(plain) и prefix = первые 8 hex.
  randAlphaNum (alnum-only) безопасен — не содержит '_' и других разделителей.
*/}}
{{- $existingHubSec := lookup "v1" "Secret" .Release.Namespace $hubSecretName -}}
{{- $defSAKeyPlain := "" -}}
{{- if and $existingHubSec $existingHubSec.data (index $existingHubSec.data "defaultSAKeyPlain") -}}
{{- $defSAKeyPlain = index $existingHubSec.data "defaultSAKeyPlain" | b64dec -}}
{{- else -}}
{{- $rand := randAlphaNum 32 -}}
{{- $prefix := lower (substr 0 8 $rand) -}}
{{- $defSAKeyPlain = printf "sa_%s_%s" $prefix $rand -}}
{{- end -}}
{{- $defSAKeyHash := sha256sum $defSAKeyPlain -}}
{{- $defSAKeyPrefix := lower (substr 3 11 $defSAKeyPlain) -}}{{/* "sa_XXXXXXXX" → 8 hex chars */}}
{{- if .Values.hub.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $hubSecretName }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub-secrets
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  dbPassword: {{ $hubDb | quote }}
  databaseUrl: {{ $hubDbUrl | quote }}
  iacScannerDsn: {{ $hubDbUrl | quote }}
  jwtSecret: {{ include "hp.resolve" (dict "ctx" . "secretName" $hubSecretName "key" "hubJwtSecret" "length" 64) | quote }}
  ## Backend читает как KEYCLOAK_CLIENT_SECRET (имя env historic), но в Secret
  ## называется authClientSecret для понятности.
  authClientSecret: {{ include "hp.resolve" (dict "ctx" . "secretName" $hubSecretName "key" "hubKeycloakClientSecret" "length" 32) | quote }}
  llmApiKey: {{ default "" .Values.secrets.hubLlmApiKey | quote }}
  iacScannerApiKey: {{ include "hp.resolve" (dict "ctx" . "secretName" $hubSecretName "key" "hubIacScannerApiKey" "length" 32) | quote }}
  ## Backend при первом старте создаёт юзера admin@hub.local с этим паролем.
  localAdminPassword: {{ include "hp.resolve" (dict "ctx" . "secretName" $hubSecretName "key" "hubLocalAdminPassword" "length" 32) | quote }}
  ## Default project / product / SA (используются seed-admin Job'ом для INSERT
  ## в БД хаба и domainscope-секретом для аутентификации к hub API).
  defaultProjectId: {{ $defProjId | quote }}
  defaultProductId: {{ $defProdId | quote }}
  defaultSAId: {{ $defSAId | quote }}
  defaultSAKeyPlain: {{ $defSAKeyPlain | quote }}
  defaultSAKeyHash: {{ $defSAKeyHash | quote }}
  defaultSAKeyPrefix: {{ $defSAKeyPrefix | quote }}
{{- end }}

{{/* --- OpenVAS --- */}}
{{- $ovAdmin := include "hp.resolve" (dict "ctx" . "secretName" $ovSecretName "key" "openvasAdminPassword" "length" 24) -}}
{{- $ovDb := include "hp.resolve" (dict "ctx" . "secretName" $ovSecretName "key" "openvasDbPassword" "length" 32) -}}
{{- if .Values.openvas.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $ovSecretName }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: openvas-secrets
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  adminPassword: {{ $ovAdmin | quote }}
  postgresPassword: {{ $ovDb | quote }}
{{- end }}

{{/* --- ZAP --- */}}
{{- $zapApi := include "hp.resolve" (dict "ctx" . "secretName" $zapSecretName "key" "zapApiKey" "length" 48) -}}
{{- if .Values.zap.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $zapSecretName }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: zap-secrets
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  apiKey: {{ $zapApi | quote }}
{{- end }}

{{/* --- DomainScope (cross-wired with openvas + zap) --- */}}
{{- $dsDb := include "hp.resolve" (dict "ctx" . "secretName" $dsSecretName "key" "domainscopeDbPassword" "length" 32) -}}
{{- $dsFullname := include "hp.domainscopeFullname" . -}}
{{- $dsDbHost := printf "%s-postgres" $dsFullname -}}
{{- $dsDsn := printf "postgres://domainscope:%s@%s:5432/domainscope?sslmode=disable" $dsDb $dsDbHost -}}
{{- $zapInstances := "" -}}
{{- if .Values.zap.enabled -}}
{{- $zapPort := 8090 -}}
{{- if and .Values.zap.service .Values.zap.service.port -}}{{- $zapPort = .Values.zap.service.port -}}{{- end -}}
{{- $zapHost := printf "http://%s.%s:%v" (include "hp.zapFullname" .) .Release.Namespace $zapPort -}}
{{- $zapInstances = printf "[{\"url\":\"%s\",\"api_key\":\"%s\"}]" $zapHost $zapApi -}}
{{- end -}}
{{- if .Values.domainscope.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dsSecretName }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: domainscope-secrets
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  postgresPassword: {{ $dsDb | quote }}
  dsn: {{ $dsDsn | quote }}
  ## Cross-wired: SA-токен хаба, выписанный seed-admin Job'ом. Используется
  ## domainscope для (а) GET /scope/export — получить domain-список из hub,
  ## (б) POST SARIF — заливать findings в product.
  sarifApiToken: {{ $defSAKeyPlain | quote }}
  hubApiToken: {{ $defSAKeyPlain | quote }}
  hubProjectId: {{ $defProjId | quote }}
  sarifProductId: {{ $defProdId | quote }}
  netboxApiToken: {{ default "" .Values.secrets.domainscopeNetboxApiToken | quote }}
  ## Cross-wired: openvas admin password (so domainscope can authenticate to gvmd).
  openvasPassword: {{ if .Values.openvas.enabled }}{{ $ovAdmin | quote }}{{ else }}""{{ end }}
  ## Cross-wired: ZAP_INSTANCES_JSON (used as DOMAINSCOPE_ZAP_INSTANCES_JSON env).
  zapInstancesJson: {{ $zapInstances | quote }}
{{- end }}

{{/* --- WireGuard secrets (one per egressing scanner) --- */}}
{{- if .Values.wireguard.enabled }}
{{- $wgSrvKey := required "wireguard.serverPublicKey is required when wireguard.enabled=true" .Values.wireguard.serverPublicKey -}}
{{- $wgSrvEp := required "wireguard.serverEndpoint is required when wireguard.enabled=true" .Values.wireguard.serverEndpoint -}}
{{- if and .Values.domainscope.enabled .Values.wireguard.peers.domainscope.privateKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-domainscope-wireguard" (include "hp.fullname" .) }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: domainscope-wireguard
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  privateKey: {{ .Values.wireguard.peers.domainscope.privateKey | quote }}
  serverPublicKey: {{ $wgSrvKey | quote }}
  serverEndpoint: {{ $wgSrvEp | quote }}
  podIp: {{ .Values.wireguard.peers.domainscope.podIp | quote }}
{{- end }}
{{- if and .Values.openvas.enabled .Values.wireguard.peers.openvas.privateKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-openvas-wireguard" (include "hp.fullname" .) }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: openvas-wireguard
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  privateKey: {{ .Values.wireguard.peers.openvas.privateKey | quote }}
  serverPublicKey: {{ $wgSrvKey | quote }}
  serverEndpoint: {{ $wgSrvEp | quote }}
  podIp: {{ .Values.wireguard.peers.openvas.podIp | quote }}
{{- end }}
{{- if and .Values.zap.enabled .Values.wireguard.peers.zap.privateKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-zap-wireguard" (include "hp.fullname" .) }}
  labels:
    {{- include "hp.labels" . | nindent 4 }}
    app.kubernetes.io/component: zap-wireguard
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  privateKey: {{ .Values.wireguard.peers.zap.privateKey | quote }}
  serverPublicKey: {{ $wgSrvKey | quote }}
  serverEndpoint: {{ $wgSrvEp | quote }}
  podIp: {{ .Values.wireguard.peers.zap.podIp | quote }}
{{- end }}
{{- end }}
