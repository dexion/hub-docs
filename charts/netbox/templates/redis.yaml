apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}-redis
  labels:
    app.kubernetes.io/component: redis
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
        command:
        - /bin/sh
        - -c
        - exec redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "chart.secretsName" . }}
              key: redisPassword
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        volumeMounts:
        - mountPath: /data
          name: redis-data
        ## Use REDISCLI_AUTH env to avoid leaking password into ps and redis logs
        ## (redis-cli warns when -a/--pass appear on the command line).
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: {{ include "chart.fullname" . }}-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-redis
  labels:
    app.kubernetes.io/component: redis
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: redis
    {{- include "chart.selectorLabels" . | nindent 4 }}
  ports:
  - port: 6379
    targetPort: 6379
