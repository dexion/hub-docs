apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
        env:
        - name: POSTGRES_DB
          value: netbox
        - name: POSTGRES_USER
          value: netbox
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "chart.secretsName" . }}
              key: dbPassword
        ## См. комментарий в security-scan-hub/postgres-deployment.yaml.
        - name: POSTGRES_HOST_AUTH_METHOD
          value: scram-sha-256
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
        ## initialDelaySeconds 60: bootstrap initdb может занять до минуты.
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "netbox", "-d", "netbox"]
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 5
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: {{ include "chart.fullname" . }}-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: postgres
    {{- include "chart.selectorLabels" . | nindent 4 }}
  ports:
  - port: 5432
    targetPort: 5432
