apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chart.fullname" . }}-postgres-data
  labels:
    app.kubernetes.io/component: postgres
    {{- include "chart.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: {{ .Values.postgres.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chart.fullname" . }}-redis-data
  labels:
    app.kubernetes.io/component: redis
    {{- include "chart.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: {{ .Values.redis.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.redis.storage.size | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chart.fullname" . }}-media
  labels:
    app.kubernetes.io/component: netbox
    {{- include "chart.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: {{ .Values.storage.media.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.storage.media.size | quote }}
