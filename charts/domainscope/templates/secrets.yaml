{{- if include "chart.shouldCreateSecret" . }}
{{- $dbPassword := include "chart.resolveSecret" (dict "ctx" . "key" "postgresPassword" "length" 32) -}}
{{- $dbUser := .Values.postgres.env.postgresUser -}}
{{- $dbName := .Values.postgres.env.postgresDb -}}
{{- $dbHost := printf "%s-postgres" (include "chart.fullname" .) -}}
{{- $dsn := printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" $dbUser $dbPassword $dbHost $dbName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.secretsName" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  postgresPassword: {{ $dbPassword | quote }}
  dsn: {{ $dsn | quote }}
  ## SARIF token: hub backend issues this. Default empty — operator must set
  ## .Values.secrets.sarifApiToken (or umbrella will wire it from hub's secret).
  sarifApiToken: {{ default "" ((.Values.secrets | default dict).sarifApiToken) | quote }}
  netboxApiToken: {{ default "" ((.Values.secrets | default dict).netboxApiToken) | quote }}
  openvasPassword: {{ default "" ((.Values.secrets | default dict).openvasPassword) | quote }}
  zapInstancesJson: {{ default "" ((.Values.secrets | default dict).zapInstancesJson) | quote }}
{{- end }}
{{- if and .Values.wireguard.enabled (not .Values.wireguard.existingSecretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.wireguardSecretName" . }}
  labels:
    app.kubernetes.io/component: wireguard
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  privateKey: {{ required "wireguard.privateKey is required when wireguard.enabled=true (generate with scripts/wg/2-generate-clients.sh)" .Values.wireguard.privateKey | quote }}
  serverPublicKey: {{ required "wireguard.serverPublicKey is required when wireguard.enabled=true" .Values.wireguard.serverPublicKey | quote }}
  serverEndpoint: {{ required "wireguard.serverEndpoint is required when wireguard.enabled=true" .Values.wireguard.serverEndpoint | quote }}
  podIp: {{ required "wireguard.podIp is required when wireguard.enabled=true" .Values.wireguard.podIp | quote }}
{{- end }}
