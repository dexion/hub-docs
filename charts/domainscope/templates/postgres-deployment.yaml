{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
        env:
        - name: POSTGRES_DB
          value: {{ .Values.postgres.env.postgresDb | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.env.postgresUser | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "chart.secretsName" . }}
              key: postgresPassword
        ## См. комментарий в security-scan-hub/postgres-deployment.yaml.
        - name: POSTGRES_HOST_AUTH_METHOD
          value: scram-sha-256
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ## initialDelaySeconds 60: даём initdb время отработать на чистом томе.
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgres.env.postgresUser }}
          initialDelaySeconds: 60
          failureThreshold: 5
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgres.env.postgresUser }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        ports:
        - containerPort: 5432
          protocol: TCP
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      restartPolicy: Always
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: {{ include "chart.fullname" . }}-postgres-data
{{- end }}
